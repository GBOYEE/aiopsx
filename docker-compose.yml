version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aiopsx
      - POSTGRES_PASSWORD=aiopsx
      - POSTGRES_DB=aiopsx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiopsx"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://aiopsx:aiopsx@postgres/aiopsx
      - OLLAMA_URL=http://ollama:11434
      - AIOPS_ENV=production
      - AIOPS_PORT=8000
      - MONITOR_INTERVAL=60
      - CPU_THRESHOLD=85
      - MEMORY_THRESHOLD=90
      - ENABLE_APPROVALS=true
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Local LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    profiles: ["llm"]  # start with: docker-compose --profile llm up

  # Optional: Streamlit dashboard (use separate compose file or include)
  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["dashboard"]  # start with: docker-compose --profile dashboard up

volumes:
  postgres_data:
  ollama:
